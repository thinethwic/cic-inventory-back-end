spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
#DEBUG<INFO<WARN<ERROR
logging.level.root=INFO

# JWT Based Authentication Configuration
# ===
jwt.secret=${JWT_SECRET:replace-this-with-a-32-char-minimum-jwt-secret-key}
jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:60}
jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}
spring.security.user.name=yourUsername
spring.security.user.password=yourPassword

cors.allowed-origins=${https://cicinventory.netlify.app/:http://localhost:3001 :http://localhost/}
