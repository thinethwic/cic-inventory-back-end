# Additional DB Configurations
# ===
spring.jpa.hibernate.ddl-auto=update
logging.level.root=ERROR

# Authentication Configuration
# ===
jwt.secret=${JWT_SECRET:replace-this-with-a-32-char-minimum-jwt-secret-key}
jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:60}
jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}

# CORS set to your Vercel frontend URL on Render once deployed
CORS_ALLOWED_ORIGINS=https://cicinventory.netlify.app/,http://localhost:3001
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3001}
